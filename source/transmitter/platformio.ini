[env:esp32-wroom-32e]
platform = espressif32
board = esp32dev
framework = arduino
monitor_port = COM19
monitor_speed = 115200
upload_port = COM19
lib_deps = 
	mikalhart/TinyGPSPlus@^1.0.3
	tzapu/WiFiManager@^2.0.17
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.0.4

[env:wokwi]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_port = COM10
monitor_speed = 115200
build_flags = -DWOKWI_SIMULATION
lib_deps = 
	mikalhart/TinyGPSPlus@^1.0.3
	tzapu/WiFiManager@^2.0.17
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.0.4
